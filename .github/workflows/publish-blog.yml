name: Manual Publish New Blog Post

on:
  workflow_dispatch:
    inputs:
      publish_new_post:
        description: "Create the next queued post before building"
        required: true
        default: false
        type: boolean
      dry_run:
        description: "Print the post that would be created without writing files"
        required: true
        default: false
        type: boolean

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Create next post
        if: inputs.publish_new_post == true
        env:
          POST_DRY_RUN: ${{ inputs.dry_run && '1' || '0' }}
        run: node new-post.js

      - name: Build site
        run: node build.js
