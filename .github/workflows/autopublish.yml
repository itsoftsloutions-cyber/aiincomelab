name: Safe Auto-publish & Deploy

# Scheduled publishing is gated by the .autopublish-enabled file.
# Delete or rename the file to disable. Create it to enable.
on:
  schedule:
    - cron: "7 */2 * * *"
  workflow_dispatch:
    inputs:
      build_only:
        description: "Build and deploy without creating a new post"
        required: true
        default: true
        type: boolean

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check autopublish gate
        id: gate
        shell: bash
        run: |
          if [ -f .autopublish-enabled ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "Scheduled autopublish is disabled. Create .autopublish-enabled file to enable."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      # Only generate a new post when the safety gate is enabled. Manual builds default to build-only.
      - name: Publish next queued topic
        if: github.event_name == 'schedule' && steps.gate.outputs.enabled == 'true'
        env:
          POST_DRY_RUN: ${{ github.event_name == 'schedule' && hashFiles('.autopublish-dry-run') != '' && '1' || '0' }}
        run: node new-post.js

      - name: Build site
        run: node build.js

      - name: Commit new content
        if: github.event_name == 'schedule' && steps.gate.outputs.enabled == 'true'
        run: |
          git config user.name  "aiincomelab-bot"
          git config user.email "bot@users.noreply.github.com"
          git add content/posts data/state.json data/publish-log.json
          git commit -m "auto: publish next queued post" || echo "nothing to commit"
          git push || echo "nothing to push"

      # Share the newly published post to all social platforms. No-ops cleanly
      # for any platform whose secrets are not configured, and never fails the build.
      - name: Distribute to social media
        if: github.event_name == 'schedule' && steps.gate.outputs.enabled == 'true'
        continue-on-error: true
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_AUTHOR_URN: ${{ secrets.LINKEDIN_AUTHOR_URN }}
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_PAGE_TOKEN: ${{ secrets.FACEBOOK_PAGE_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
        run: |
          node scripts/social-distribute.js
          git add data/social-log.json || true
          git commit -m "auto: log social distribution" || echo "nothing to commit"
          git push || echo "nothing to push"

      - name: Upload publish/build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: publish-build-logs
          path: |
            data/state.json
            data/publish-log.json
            data/social-log.json
          if-no-files-found: ignore

      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: publish
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
